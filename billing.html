<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0f172a"/>
  <link rel="manifest" href="manifest.json"/>
  <title>SmartPark – Billing</title>
  <link rel="stylesheet" href="core.css"/>
  <style>
    .page-main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .page-header{display:flex;align-items:center;justify-content:space-between}
    .page-header h1{font-size:18px;font-weight:800}
    .billing-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .bill-kpi{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
    .bill-kpi-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
    .bill-kpi-val{font-size:26px;font-weight:800}
    .bill-kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .transactions{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead{background:#f8fafc}
    th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    td{padding:10px 14px;font-size:12px;border-top:1px solid var(--border)}
    tr:hover td{background:#f8fafc}
    .tx-type{border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700}
    .tx-charge{background:#fee2e2;color:#dc2626}
    .tx-refund{background:#dcfce7;color:#16a34a}
    .chart-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
    .chart-card h3{font-size:13px;font-weight:700;margin-bottom:12px}
  </style>
</head>
<body>
<header class="nav">
  <div class="nav-brand"><div class="nav-logo">P</div><span class="nav-title">SMART<span>PARK</span></span></div>
  <div class="nav-search">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#94a3b8" stroke-width="1.5"/><path d="M15 15l-3-3" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input type="text" placeholder="Search transactions…"/>
  </div>
  <div class="nav-right"><div class="nav-user"><div class="nav-avatar">SJ</div><span>Sarah J.</span></div></div>
</header>
<div class="layout">
<aside class="sidebar">
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg><span>Dashboard</span></a>
    <a href="map.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 9m0 8V9m0 0L9 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Real-time Map</span></a>
    <a href="bookings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>My Bookings</span><span class="sidebar-badge">2</span></a>
    <a href="vehicles.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zm10 0a2 2 0 11-4 0 2 2 0 014 0z" stroke="currentColor" stroke-width="1.5"/><path d="M13 6H4l-1 5h14l-1-5h-3zm0 0V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Vehicles</span></a>
    <a href="billing.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Billing</span></a>
    <a href="#" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg><span>Settings</span></a>
  </nav>
  <div class="sidebar-footer"><div class="sidebar-status"><span class="pulse-dot"></span><span>System Online</span></div></div>
</aside>

<main class="page-main">
  <div class="page-header">
    <h1>Billing & Payments</h1>
    <button class="btn-primary">Download Statement</button>
  </div>

  <div class="billing-grid">
    <div class="bill-kpi"><div class="bill-kpi-label">This Month</div><div class="bill-kpi-val" style="color:var(--green)">$1,240.50</div><div class="bill-kpi-sub">↑ 12% vs last month</div></div>
    <div class="bill-kpi"><div class="bill-kpi-label">Total Sessions</div><div class="bill-kpi-val">109</div><div class="bill-kpi-sub">Avg $11.38 / session</div></div>
    <div class="bill-kpi"><div class="bill-kpi-label">Outstanding</div><div class="bill-kpi-val" style="color:var(--red)">$8.38</div><div class="bill-kpi-sub">1 active session</div></div>
  </div>

  

  <div class="transactions">
    <table>
      <thead><tr><th>Transaction ID</th><th>Vehicle</th><th>Slot</th><th>Date</th><th>Duration</th><th>Amount</th><th>Type</th><th>Method</th></tr></thead>
      <tbody id="txBody"></tbody>
    </table>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="core.js"></script>
<script>
const TRANSACTIONS = [
  {id:'TX-8821',vehicle:'Tesla Model 3',slot:'A3',date:'Mar 15, 2026 10:30',duration:'2h 15m',amount:'$8.38',type:'charge',method:'Card ••4242'},
  {id:'TX-8820',vehicle:'BMW X5',slot:'B7',date:'Mar 15, 2026 08:00',duration:'3h 00m',amount:'$11.00',type:'charge',method:'Apple Pay'},
  {id:'TX-8819',vehicle:'Honda Civic',slot:'A9',date:'Mar 14, 2026 11:00',duration:'1h 30m',amount:'$5.75',type:'charge',method:'Card ••4242'},
  {id:'TX-8818',vehicle:'Ford Mustang',slot:'D4',date:'Mar 14, 2026 09:00',duration:'4h 00m',amount:'$14.50',type:'charge',method:'Google Pay'},
  {id:'TX-8817',vehicle:'Audi A4',slot:'C2',date:'Mar 13, 2026 14:00',duration:'2h 00m',amount:'$7.50',type:'refund',method:'Card ••9901'},
  {id:'TX-8816',vehicle:'Tesla Model S',slot:'E1',date:'Mar 13, 2026 10:00',duration:'1h 00m',amount:'$4.00',type:'charge',method:'Card ••5500'},
  {id:'TX-8815',vehicle:'Toyota Camry',slot:'B3',date:'Mar 12, 2026 13:00',duration:'3h 30m',amount:'$12.75',type:'charge',method:'Apple Pay'},
];

document.getElementById('txBody').innerHTML = TRANSACTIONS.map(t=>`
  <tr>
    <td><strong>${t.id}</strong></td>
    <td>${t.vehicle}</td>
    <td><strong style="color:var(--blue)">${t.slot}</strong></td>
    <td style="color:var(--muted)">${t.date}</td>
    <td>${t.duration}</td>
    <td><strong style="color:${t.type==='charge'?'var(--red)':'var(--green)'}">${t.type==='refund'?'+':'−'}${t.amount}</strong></td>
    <td><span class="tx-type ${t.type==='charge'?'tx-charge':'tx-refund'}">${t.type.charAt(0).toUpperCase()+t.type.slice(1)}</span></td>
    <td style="color:var(--muted)">${t.method}</td>
  </tr>`).join('');

Chart.defaults.font.size=10;
Chart.defaults.color='#94a3b8';

new Chart(document.getElementById('billingChart'),{
  type:'bar',
  data:{
    labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    datasets:[{
      label:'Revenue',
      data:[820,940,760,1100,980,1340,1240,0,0,0,0,0],
      backgroundColor:'rgba(59,130,246,.7)',borderRadius:4,borderSkipped:false,
    }]
  },
  options:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'#f1f5f9'},ticks:{callback:v=>'$'+v}}},responsive:true,maintainAspectRatio:false}
});

new Chart(document.getElementById('payChart'),{
  type:'doughnut',
  data:{
    labels:['Credit Card','Apple Pay','Google Pay','Cash'],
    datasets:[{data:[580,320,240,100],backgroundColor:['#3b82f6','#22c55e','#f59e0b','#94a3b8'],borderWidth:2,borderColor:'#fff'}]
  },
  options:{cutout:'65%',plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:8,font:{size:10}}}},responsive:true,maintainAspectRatio:false}
});
</script>
</body>
</html>
