<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0f172a"/>
  <link rel="manifest" href="manifest.json"/>
  <title>SmartPark – My Bookings</title>
  <link rel="stylesheet" href="core.css"/>
  <style>
    .page-main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .page-header{display:flex;align-items:center;justify-content:space-between}
    .page-header h1{font-size:18px;font-weight:800}
    .tabs{display:flex;gap:4px;background:#e2e8f0;border-radius:8px;padding:3px}
    .tab{padding:6px 16px;border-radius:6px;border:none;background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
    .tab.active{background:#fff;color:var(--text);box-shadow:var(--shadow)}
    .bookings-table{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead{background:#f8fafc}
    th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    td{padding:10px 14px;font-size:12px;border-top:1px solid var(--border)}
    tr:hover td{background:#f8fafc}
    .status-pill{border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700}
    .pill-active{background:#dcfce7;color:#16a34a}
    .pill-completed{background:#f1f5f9;color:#64748b}
    .pill-reserved{background:#dbeafe;color:#2563eb}
    .pill-cancelled{background:#fee2e2;color:#dc2626}
    .action-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600}
    .action-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
    .new-booking-form{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;gap:4px}
    .form-group label{font-size:11px;font-weight:600;color:var(--muted)}
    .form-group input,.form-group select{
      padding:8px 10px;border:1px solid var(--border);border-radius:6px;
      font-size:12px;outline:none;color:var(--text);
    }
    .form-group input:focus,.form-group select:focus{border-color:var(--blue)}
    .summary-box{background:#f8fafc;border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px}
    .summary-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)}
    .summary-row:last-child{border:none;font-weight:700;font-size:13px}
  </style>
</head>
<body>
<header class="nav">
  <div class="nav-brand"><div class="nav-logo">P</div><span class="nav-title">SMART<span>PARK</span></span></div>
  <div class="nav-search">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#94a3b8" stroke-width="1.5"/><path d="M15 15l-3-3" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input type="text" placeholder="Search bookings…"/>
  </div>
  <div class="nav-right">
    <div class="nav-user"><div class="nav-avatar">SJ</div><span>Sarah J.</span></div>
  </div>
</header>
<div class="layout">
<aside class="sidebar">
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg><span>Dashboard</span></a>
    <a href="map.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 9m0 8V9m0 0L9 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Real-time Map</span></a>
    <a href="bookings.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>My Bookings</span><span class="sidebar-badge">2</span></a>
    <a href="vehicles.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zm10 0a2 2 0 11-4 0 2 2 0 014 0z" stroke="currentColor" stroke-width="1.5"/><path d="M13 6H4l-1 5h14l-1-5h-3zm0 0V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Vehicles</span></a>
    <a href="billing.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Billing</span></a>
    <a href="#" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg><span>Settings</span></a>
  </nav>
  <div class="sidebar-footer"><div class="sidebar-status"><span class="pulse-dot"></span><span>System Online</span></div></div>
</aside>

<main class="page-main">
  <div class="page-header">
    <h1>My Bookings</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('all',this)">All</button>
        <button class="tab" onclick="switchTab('active',this)">Active</button>
        <button class="tab" onclick="switchTab('upcoming',this)">Upcoming</button>
        <button class="tab" onclick="switchTab('history',this)">History</button>
      </div>
      <button class="btn-primary" onclick="toggleNewBooking()">+ New Booking</button>
    </div>
  </div>

  <!-- NEW BOOKING FORM -->
  <div class="new-booking-form" id="newBookingForm" style="display:none">
    <h3 style="margin-bottom:14px;font-size:14px;font-weight:700">New Booking</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Vehicle</label>
        <select id="bkVehicle">
          <option>Tesla Model 3 (SF-7789)</option>
          <option>BMW X5 (SF-4421)</option>
          <option>Audi A4 (SF-9901)</option>
          <option>Honda Civic (SF-3310)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Preferred Slot</label>
        <select id="bkSlot">
          <option>Auto-assign</option>
          <option>A2</option><option>A4</option><option>B1</option>
          <option>B3</option><option>C5</option><option>D2</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="bkDate"/>
      </div>
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" id="bkStart" value="09:00"/>
      </div>
      <div class="form-group">
        <label>Duration (hours)</label>
        <select id="bkDuration" onchange="calcFee()">
          <option value="1">1 hour</option>
          <option value="2" selected>2 hours</option>
          <option value="3">3 hours</option>
          <option value="4">4 hours</option>
          <option value="8">8 hours (Full day)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Estimated Fee</label>
        <input type="text" id="bkFee" value="$7.00" readonly style="background:#f8fafc"/>
      </div>
    </div>
    <div class="summary-box">
      <div class="summary-row"><span>Rate</span><span>$3.50 / hour</span></div>
      <div class="summary-row"><span>Duration</span><span id="sumDur">2 hours</span></div>
      <div class="summary-row"><span>Service fee</span><span>$0.50</span></div>
      <div class="summary-row"><span>Total</span><span id="sumTotal">$7.50</span></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" onclick="submitBooking()">Confirm Booking</button>
      <button class="btn-sm" onclick="toggleNewBooking()">Cancel</button>
    </div>
  </div>

  <!-- BOOKINGS TABLE -->
  <div class="bookings-table">
    <table>
      <thead>
        <tr>
          <th>Booking ID</th><th>Vehicle</th><th>Slot</th>
          <th>Date & Time</th><th>Duration</th><th>Fee</th>
          <th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="bookingsBody"></tbody>
    </table>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>
<script src="core.js"></script>
<script>
const BOOKINGS = [
  {id:'BK-1001',vehicle:'Tesla Model 3',plate:'SF-7789',slot:'A3',date:'Mar 15, 2026',time:'10:30 AM',duration:'2h 15m',fee:'$8.38',status:'active'},
  {id:'BK-1002',vehicle:'BMW X5',plate:'SF-4421',slot:'B7',date:'Mar 15, 2026',time:'08:00 AM',duration:'3h 00m',fee:'$11.00',status:'completed'},
  {id:'BK-1003',vehicle:'Audi A4',plate:'SF-9901',slot:'C2',date:'Mar 16, 2026',time:'02:00 PM',duration:'2h 00m',fee:'$7.50',status:'reserved'},
  {id:'BK-1004',vehicle:'Honda Civic',plate:'SF-3310',slot:'A9',date:'Mar 14, 2026',time:'11:00 AM',duration:'1h 30m',fee:'$5.75',status:'completed'},
  {id:'BK-1005',vehicle:'Ford Mustang',plate:'SF-7712',slot:'D4',date:'Mar 15, 2026',time:'09:00 AM',duration:'4h 00m',fee:'$14.50',status:'active'},
  {id:'BK-1006',vehicle:'Tesla Model S',plate:'SF-5500',slot:'E1',date:'Mar 17, 2026',time:'10:00 AM',duration:'2h 00m',fee:'$7.50',status:'reserved'},
];

const STATUS_CLASSES = {active:'pill-active',completed:'pill-completed',reserved:'pill-reserved',cancelled:'pill-cancelled'};
let currentTab = 'all';

function renderBookings(){
  const tbody = document.getElementById('bookingsBody');
  const filtered = currentTab==='all' ? BOOKINGS :
    currentTab==='active' ? BOOKINGS.filter(b=>b.status==='active') :
    currentTab==='upcoming' ? BOOKINGS.filter(b=>b.status==='reserved') :
    BOOKINGS.filter(b=>b.status==='completed'||b.status==='cancelled');
  tbody.innerHTML = filtered.map(b=>`
    <tr>
      <td><strong>${b.id}</strong></td>
      <td><div style="font-weight:600">${b.vehicle}</div><div style="color:var(--muted);font-size:10px">${b.plate}</div></td>
      <td><strong style="color:var(--blue)">${b.slot}</strong></td>
      <td><div>${b.date}</div><div style="color:var(--muted);font-size:10px">${b.time}</div></td>
      <td>${b.duration}</td>
      <td><strong style="color:var(--green)">${b.fee}</strong></td>
      <td><span class="status-pill ${STATUS_CLASSES[b.status]}">${b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span></td>
      <td>
        ${b.status==='active'?`<button class="action-btn" onclick="endBooking('${b.id}')">End</button>`:''}
        ${b.status==='reserved'?`<button class="action-btn" onclick="cancelBooking('${b.id}')">Cancel</button>`:''}
        ${b.status==='completed'?`<button class="action-btn">Receipt</button>`:''}
      </td>
    </tr>`).join('');
}

function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderBookings();
}

function toggleNewBooking(){
  const f = document.getElementById('newBookingForm');
  f.style.display = f.style.display==='none' ? 'block' : 'none';
  if(f.style.display==='block'){
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('bkDate').value = today;
  }
}

function calcFee(){
  const hrs = parseInt(document.getElementById('bkDuration').value);
  const fee = (hrs*3.5+0.5).toFixed(2);
  document.getElementById('bkFee').value = '$'+fee;
  document.getElementById('sumDur').textContent = hrs+' hour'+(hrs>1?'s':'');
  document.getElementById('sumTotal').textContent = '$'+fee;
}

function submitBooking(){
  const v = document.getElementById('bkVehicle').value;
  const s = document.getElementById('bkSlot').value;
  const d = document.getElementById('bkDate').value;
  const t = document.getElementById('bkStart').value;
  const dur = document.getElementById('bkDuration').value;
  const fee = document.getElementById('bkFee').value;
  const id = 'BK-'+Math.floor(Math.random()*9000+1000);
  BOOKINGS.unshift({id,vehicle:v.split('(')[0].trim(),plate:v.match(/\(([^)]+)\)/)?.[1]||'',slot:s==='Auto-assign'?'B'+Math.floor(Math.random()*9+1):s,date:d,time:t,duration:dur+'h 00m',fee,status:'reserved'});
  renderBookings();
  toggleNewBooking();
  showToast('Booking '+id+' confirmed!');
}

function endBooking(id){
  const b = BOOKINGS.find(x=>x.id===id);
  if(b){ b.status='completed'; renderBookings(); showToast('Session ended. Fee: '+b.fee); }
}

function cancelBooking(id){
  const b = BOOKINGS.find(x=>x.id===id);
  if(b){ b.status='cancelled'; renderBookings(); showToast('Booking '+id+' cancelled.'); }
}

document.addEventListener('DOMContentLoaded', renderBookings);
</script>
</body>
</html>
