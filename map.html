<!-- MAP PAGE BODY -->
<div class="map-body">

  <!-- MAP AREA -->
  <div class="map-area">
    <canvas id="parkCanvas"></canvas>

    <!-- Map Controls -->
    <div class="map-ctrl">
      <button class="map-btn" id="zoomIn" title="Zoom In">+</button>
      <button class="map-btn" id="zoomOut" title="Zoom Out">−</button>
      <button class="map-btn" id="resetView" title="Reset">⌂</button>
      <button class="map-btn" id="toggleView" title="Toggle View">🛰</button>
    </div>

    <!-- Legend -->
    <div class="map-legend">
      <span><i style="background:#22c55e"></i>Available</span>
      <span><i style="background:#ef4444"></i>Occupied</span>
      <span><i style="background:#3b82f6"></i>Reserved</span>
      <span><i style="background:#a855f7"></i>EV Charging</span>
    </div>

    <!-- Slot tooltip -->
    <div class="slot-tip" id="slotTip"></div>
  </div>

  <!-- RIGHT PANELS -->
  <div class="map-panels">

    <!-- LIVE STATUS -->
    <div class="mpanel">
      <div class="mpanel-head">
        <span class="mpanel-title">LIVE STATUS</span>
        <span class="pulse-dot"></span>
      </div>
      <div class="live-grid">
        <div class="live-item">
          <div class="live-label">TOTAL</div>
          <div class="live-num" id="statTotal">50</div>
        </div>
        <div class="live-item">
          <div class="live-label avail-lbl">● AVAILABLE</div>
          <div class="live-num green" id="statAvail">0</div>
        </div>
        <div class="live-item">
          <div class="live-label occ-lbl">● OCCUPIED</div>
          <div class="live-num red" id="statOccupied">0</div>
        </div>
        <div class="live-item">
          <div class="live-label res-lbl">■ RESERVED</div>
          <div class="live-num blue" id="statReserved">0</div>
        </div>
        <div class="live-item">
          <div class="live-label ev-lbl">⚡ EV</div>
          <div class="live-num purple" id="statEV">0</div>
        </div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="mpanel">
      <div class="mpanel-head"><span class="mpanel-title">SEARCH</span></div>
      <div class="msearch-wrap">
        <input type="text" id="panelSearch" placeholder="Slot, vehicle, plate…" class="msearch"/>
        <button class="msearch-btn" onclick="doSearch()">🔍</button>
      </div>
      <div id="searchCard" class="search-card hidden">
        <div class="sc-icon">🚗</div>
        <div class="sc-info" id="scInfo"></div>
        <button class="sc-pin" id="scPin" title="Locate on map">📍</button>
      </div>
    </div>

    <!-- SENSOR STATUS -->
    <div class="mpanel sensor-mpanel">
      <div class="mpanel-head"><span class="mpanel-title">SENSOR STATUS</span></div>
      <div id="sensorList" class="sensor-list"></div>
    </div>

    <!-- CAMERAS -->
    <div class="mpanel cam-mpanel">
      <div class="cam-feed-box">
        <div class="cam-hud"><span class="cam-rec-dot">● REC</span><span id="camTime1"></span></div>
        <div class="cam-scene cam-north"><div class="cam-car cc1"></div><div class="cam-car cc2"></div></div>
        <div class="cam-footer">North Entrance</div>
      </div>
      <div class="cam-feed-box">
        <div class="cam-hud"><span class="cam-rec-dot">● REC</span><span id="camTime2"></span></div>
        <div class="cam-scene cam-south"><div class="cam-car cc3"></div></div>
        <div class="cam-footer">Main Exit</div>
      </div>
    </div>

  </div>
</div>
</div>

<!-- SLOT MODAL -->
<div class="modal-overlay" id="slotModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalTitle">Slot</h3>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="core.js"></script>
<script src="map-page.js"></script>
